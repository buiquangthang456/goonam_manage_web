<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <title>GoonamVina</title>
  <link rel="stylesheet" type="text/css" th:href="@{/css-admin/addproject.css}"/>
  <link rel="stylesheet" type="text/css" th:href="@{/css-admin/dashboard.css}"/>

</head>
<body>
<div class="dashboard">
  <div th:replace="admin/layout-admin/sidebar :: sidebarFragment"></div>
  <div class="main-content">
    <header>
      <button class="toggle-btn" id="toggle-btn">&#9776;</button>
      <div th:if="${metal != null}">
        <h1 th:text="${metal.id != null} ? 'Edit Metal' : 'Add a New Metal'"></h1>
        <form th:action="@{/admin/search-metal}" method="get">
          <input type="text" name="keyword" placeholder="Search for products or categories..." th:value="${keyword}">
          <button type="submit" class="btn">Search</button>
        </form>
      </div>

      <div class="user-info">
        <span>Welcome, [User]</span>
        <a href="/admin/logout" class="btn">Logout</a>
      </div>
    </header>
    <section class="content">

      <div class="project-form" th:if="${metal != null}">
        <h2 th:text="${metal?.id != null} ? 'Edit Metal' : 'Create a New Metal'"></h2>
        <form id="metal-form" th:action="@{${metal?.id != null} ? '/admin/update-metal/' + ${metal.id} : '/admin/add-metal'}"
              th:object="${metal}" method="POST" enctype="multipart/form-data">
          <input type="hidden" th:field="*{id}" />
          <!-- Tên Metal bằng tiếng Việt -->
          <div class="form-group">
            <label for="metal-name-vi">Metal Name (Vietnamese)</label>
            <input type="text" id="metal-name-vi" th:field="*{nameVi}" required>
          </div>

          <!-- Tên Metal bằng tiếng Anh -->
          <div class="form-group">
            <label for="metal-name-en">Metal Name (English)</label>
            <input type="text" id="metal-name-en" th:field="*{nameEn}" required>
          </div>
          <!-- Danh mục kim loại -->
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" th:field="*{metalCategory.id}" required>
              <option value="">Select a category</option>
              <option th:each="category : ${metal_categories}"
                      th:value="${category.id}"
                      th:text="${category.nameVi}"
                      th:selected="${category.id == metal.metalCategory?.id}">
              </option>
            </select>
          </div>
          <!-- Mô tả Metal bằng tiếng Việt -->
          <div class="form-group">
            <label for="description-vi">Description (Vietnamese)</label>
            <textarea id="description-vi" th:field="*{descriptionVi}" rows="5" required></textarea>
          </div>
          <!-- Mô tả Metal bằng tiếng Anh -->
          <div class="form-group">
            <label for="description-en">Description (English)</label>
            <textarea id="description-en" th:field="*{descriptionEn}" rows="5" required></textarea>
          </div>
          <div class="form-group">
            <label for="metal-image">Upload Image</label>
            <input type="file" id="metal-image" name="metal-image" accept="image/*" th:attr="required=${metal.imageM == null}">
            <div th:if="${metal.imageM != null}">
              <label>Current Image:</label>
              <img th:src="@{'/uploads/images/' + ${metal.imageM}}" alt="Metal Image" style="width: 100px; height: auto;"/>
            </div>
          </div>
          <button type="submit" class="btn" th:text="${metal.id != null} ? 'Update Metal' : 'Add Metal'"></button>
        </form>
      </div>

      <div class="projects-table">
        <h2>Project List</h2>
        <table id="projects-table">
          <thead>
          <tr>
            <th>Metal Name (Vietnamese)</th>
            <th>Metal Name (English)</th>
            <th>Category</th>
            <th>Description (Vietnamese)</th>
            <th>Description (English)</th>
            <th>Image</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="metal : ${metals}">
            <td th:text="${metal.nameVi}"></td>
            <td th:text="${metal.nameEn}"></td>
            <td th:text="${metal.metalCategory.nameVi}"></td>
            <td th:text="${metal.descriptionVi}"></td>
            <td th:text="${metal.descriptionEn}"></td>
            <td>
              <img th:src="@{'/uploads/images/' + ${metal.imageM}}" alt="No Image" style="max-width: 100px;"/>
            </td>
            <td>
              <a th:href="@{'/admin/edit-metal/' + ${metal.id}}">Edit</a> |
              <a th:href="@{'/admin/delete-metal/' + ${metal.id}}" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>
<script src="/js-admin/admin.js"></script>
</body>
</html>

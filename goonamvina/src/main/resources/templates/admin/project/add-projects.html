<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <title>GoonamVina</title>
  <link rel="stylesheet" type="text/css" th:href="@{/css-admin/addproject.css}"/>
  <link rel="stylesheet" type="text/css" th:href="@{/css-admin/dashboard.css}"/>
</head>
<body>
<div class="dashboard">
  <div th:replace="admin/layout-admin/sidebar :: sidebarFragment"></div>
  <div class="main-content">
    <header>
      <button class="toggle-btn" id="toggle-btn">&#9776;</button>

      <div class="project-search">
        <form th:action="@{/admin/search-projects}" method="get">
          <h1>Search Projects</h1>
          <input type="text" name="keyword" placeholder="Search for projects..." th:value="${keyword}">
          <button type="submit" class="btn">Search</button>
        </form>
      </div>
      <div class="user-info">
        <span>Welcome, [User]</span>
        <a href="/admin/logout" class="btn">Logout</a>
      </div>
    </header>
    <section class="content">

      <div class="project-form" th:if="${project != null}">
        <h2 th:text="${project?.id != null} ? 'Edit Project' : 'Create a New Project'"></h2>
        <form id="project-form" th:action="@{${project?.id != null} ? '/admin/update-project/' + ${project.id} : '/admin/add-project'}"
              th:object="${project}" method="POST" enctype="multipart/form-data">
          <input type="hidden" th:field="*{id}" />
          <!-- Project Name (Vietnamese) -->
          <div class="form-group">
            <label for="project-name-vi">Project Name (Vietnamese)</label>
            <input type="text" id="project-name-vi" th:field="*{nameVi}" required>
          </div>
          <!-- Project Name (English) -->
          <div class="form-group">
            <label for="project-name-en">Project Name (English)</label>
            <input type="text" id="project-name-en" th:field="*{nameEn}" required>
          </div>

          <!-- Investor (Vietnamese) -->
          <div class="form-group">
            <label for="investor-vi">Investor (Vietnamese)</label>
            <input type="text" id="investor-vi" th:field="*{investorVi}" required>
          </div>
          <!-- Investor (English) -->
          <div class="form-group">
            <label for="investor-en">Investor (English)</label>
            <input type="text" id="investor-en" th:field="*{investorEn}" required>
          </div>
          <!-- Location (Vietnamese) -->
          <div class="form-group">
            <label for="location-vi">Location (Vietnamese)</label>
            <input type="text" id="location-vi" th:field="*{locationVi}" required>
          </div>
          <!-- Location (English) -->
          <div class="form-group">
            <label for="location-en">Location (English)</label>
            <input type="text" id="location-en" th:field="*{locationEn}" required>
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" th:field="*{projectCategory.id}" required>
              <option value="">Select a category</option>
              <option th:each="category : ${project_categories}"
                      th:value="${category.id}"
                      th:text="${category.nameVi}"
                      th:selected="${category.id == project.projectCategory?.id}">
              </option>
            </select>
          </div>
          <!-- Thêm 2 trường mới cho năm bắt đầu và năm hoàn thành -->
          <div class="form-group">
            <label for="start-year">Start Year</label>
            <input type="text" id="start-year" th:field="*{startYear}" min="1900" max="2100" required>
          </div>
          <div class="form-group">
            <label for="completion-year">Completion Year</label>
            <input type="text" id="completion-year" th:field="*{completionYear}" min="1900" max="2100" required>
          </div>

          <!-- Description (Vietnamese) -->
          <div class="form-group">
            <label for="description-vi">Description (Vietnamese)</label>
            <textarea id="description-vi" th:field="*{descriptionVi}" rows="5" required></textarea>
            <div th:if="${#fields.hasErrors('descriptionVi')}" th:errors="*{descriptionVi}" class="error-message" style="color: red;"></div>
          </div>
          <!-- Description (English) -->
          <div class="form-group">
            <label for="description-en">Description (English)</label>
            <textarea id="description-en" th:field="*{descriptionEn}" rows="5" required></textarea>
            <div th:if="${#fields.hasErrors('descriptionEn')}" th:errors="*{descriptionEn}" class="error-message" style="color: red;"></div>
          </div>

          <div class="form-group">
            <label for="project-image">Upload Image</label>
            <input type="file" id="project-image" name="project-image" accept="image/*" th:attr="required=${project.imageProject == null}">
            <div th:if="${project.imageProject != null}">
              <label>Current Image:</label>
              <img th:src="@{'/uploads/images/' + ${project.imageProject}}" alt="Project Image" style="width: 100px; height: auto;"/>
            </div>
          </div>
          <button type="submit" class="btn" th:text="${project.id != null} ? 'Update Project' : 'Add Project'"></button>
        </form>
      </div>

      <div class="projects-table">
        <h2>Project List</h2>
        <table id="projects-table">
          <thead>
          <tr>
            <th>Project Name (Vietnamese)</th>
            <th>Project Name (English)</th>
            <th>Investor (Vietnamese)</th>
            <th>Investor (English)</th>
            <th>Location (Vietnamese)</th>
            <th>Location (English)</th>
            <th>Category</th>
            <th>Start Year</th>
            <th>Completion Year</th>
            <th>Description (Vietnamese)</th>
            <th>Description (English)</th>
            <th>Image</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="project : ${projects}">
            <td th:text="${project.nameVi}"></td>
            <td th:text="${project.nameEn}"></td>
            <td th:text="${project.investorVi}"></td>
            <td th:text="${project.investorEn}"></td>
            <td th:text="${project.locationVi}"></td>
            <td th:text="${project.locationEn}"></td>
            <td th:text="${project.projectCategory.nameVi}"></td>
            <td th:text="${project.startYear}"></td>
            <td th:text="${project.completionYear}"></td>
            <td th:text="${project.descriptionVi}"></td>
            <td th:text="${project.descriptionEn}"></td>
            <td>
              <img th:src="@{'/uploads/images/' + ${project.imageProject}}" alt="No Image" style="max-width: 100px;"/>
            </td>
            <td>
              <a th:href="@{'/admin/edit-project/' + ${project.id}}">Edit</a> |
              <a th:href="@{'/admin/delete-project/' + ${project.id}}" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>
<script src="/js-admin/admin.js"></script>
</body>
</html>

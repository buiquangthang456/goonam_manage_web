<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <title>Users Management</title>
  <link rel="stylesheet" type="text/css" th:href="@{/css-admin/user.css}"/>
  <link rel="stylesheet" type="text/css" th:href="@{/css-admin/dashboard.css}"/>
</head>
<body>
<div class="dashboard">
  <div th:replace="admin/layout-admin/sidebar :: sidebarFragment"></div>
  <div class="main-content">
    <header>
      <button class="toggle-btn" id="toggle-btn">&#9776;</button>
      <h1>Users Management</h1>
      <div class="user-info">
        <span>Welcome, <span th:text="${#authentication.name}"></span></span>
        <a href="/admin/logout" class="btn">Logout</a>
      </div>
    </header>
    <section class="content">
      <div class="user-form">
        <h2>Add a New User</h2>
        <form id="user-form" th:action="@{/admin/user/add}" method="post">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <div th:if="${usernameError != null}" class="error-message">
              <p th:text="${usernameError}"></p>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <div th:if="${emailError != null}" class="error-message">
              <p th:text="${emailError}"></p>
            </div>
          </div>
          <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" required>
              <option value="">Select a role</option>
              <option value="admin">ADMIN</option>

            </select>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
          </div>
          <button type="submit" class="btn">Add User</button>
        </form>
      </div>
      <div class="users-table">
        <h2>User List</h2>
        <table id="users-table">
          <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="user : ${users}">
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.role}"></td>
            <td>
              <form th:action="@{/admin/user/delete/{id}(id=${user.id})}" method="post">
                <button type="submit" class="btn">Delete</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>
<script src="/js-admin/admin.js"></script>
</body>
</html>

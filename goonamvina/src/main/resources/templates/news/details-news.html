<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${(lang == 'vi' ? news.titleVi : news.titleEn) + ' | Goonam Vina'}">GoonamVina</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/homepage.css}"/>
    <link rel="stylesheet" type="text/css" th:href="@{/css/details-news.css}"/>
</head>
<body>
<header layout:include="layout/menu :: header"></header>

<main>
    <article class="news-detail">
        <h1 th:text="${lang == 'vi' ? news.titleVi : news.titleEn}"></h1>
        <p th:utext="${lang == 'vi' ? news.shortContentVi : news.shortContentEn}"></p>
        <img th:src="@{'/uploads/images/' + ${news.imageName}}"
             th:alt="${lang == 'vi' ? news.titleVi : news.titleEn}">
        <div class="news-body" th:utext="${lang == 'vi' ? news.contentVi : news.contentEn}"></div>
    </article>

    <section class="related-posts" th:if="${relatedNewsList != null and !relatedNewsList.isEmpty()}">
        <h2 th:text="${lang == 'vi' ? 'Bài viết liên quan' : 'Related Posts'}">Bài viết liên quan</h2>
        <div class="related-grid">
            <a th:each="relatedNewsItem : ${relatedNewsList}"
               th:href="@{'/news/' + ${relatedNewsItem.slug}}"
               class="related-item">
                <div class="ri-img">
                    <img th:src="@{'/uploads/images/' + ${relatedNewsItem.imageName}}"
                         th:alt="${lang == 'vi' ? relatedNewsItem.titleVi : relatedNewsItem.titleEn}">
                </div>
                <div class="ri-body">
                    <h3 th:text="${lang == 'vi' ? relatedNewsItem.titleVi : relatedNewsItem.titleEn}"></h3>
                    <span class="ri-cta" th:text="${lang == 'vi' ? 'Đọc thêm →' : 'Read more →'}">Đọc thêm →</span>
                </div>
            </a>
        </div>
    </section>
</main>

<footer layout:include="layout/footer :: footer"></footer>

<script src="/js/script.js"></script>
<script src="/js/changelanguage.js"></script>
</body>
</html>

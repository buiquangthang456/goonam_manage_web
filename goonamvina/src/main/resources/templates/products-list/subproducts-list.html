<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <title>GoonamVina</title>
  <link rel="stylesheet" type="text/css" th:href="@{/css/products-list.css}"/>
  <link rel="stylesheet" type="text/css" th:href="@{/css/homepage.css}"/>
</head>
<body>
<header layout:include="layout/menu :: header"></header>
<main>
<section class="product-categories">
  <div class="category-item" th:each="spc : ${spcList}">
    <h2 th:text="${#locale.language.equals('vi') ? spc.nameVi : spc.nameEn}"></h2>
    <img th:src="@{'/uploads/images/' + ${spc.imagePSC}}" alt="Cửa">
    <button ><a th:href="@{/products/{slug}(slug=${spc.slug})}" th:text="#{button.viewmore}"></a></button>
  </div>
</section>
</main>


<footer layout:include="layout/footer :: footer"></footer>
<script src="/js/script.js"></script>
<script src="/js/changelanguage.js"></script>
</body>
</html>

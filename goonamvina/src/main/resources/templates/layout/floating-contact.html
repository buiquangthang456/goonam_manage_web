<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>
<div th:fragment="widget">
    <style>
        .floating-contact{position:fixed;right:16px;bottom:18px;display:flex;flex-direction:column;gap:10px;z-index:9999}
        .floating-contact .fc-btn{display:flex;align-items:center;gap:8px;color:#fff;text-decoration:none;padding:10px 16px;border-radius:30px;box-shadow:0 4px 14px rgba(0,0,0,.25);font-weight:600;font-size:14px;white-space:nowrap;transition:transform .15s}
        .floating-contact .fc-btn:hover{transform:translateX(-4px)}
        .floating-contact .fc-call{background:#1aab2c}
        .floating-contact .fc-zalo{background:#0068ff}
        .floating-contact .fc-quote{background:#c9a14a;color:#1a1a1a}
        .floating-contact .fc-btn svg{flex:0 0 auto}
        .floating-contact .fc-zalo-mark{font-weight:800;background:#fff;color:#0068ff;border-radius:6px;padding:1px 6px;font-size:12px;line-height:1.4}
        @media(max-width:600px){.floating-contact .fc-label{display:none}.floating-contact .fc-btn{padding:12px;border-radius:50%}}
    </style>
    <div class="floating-contact" aria-label="Liên hệ nhanh">
        <a class="fc-btn fc-call" href="tel:0974647949" th:title="#{floating.hotline}" title="Gọi Hotline">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M6.6 10.8a15.5 15.5 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.25 11.4 11.4 0 0 0 3.6.58 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.45.58 3.6a1 1 0 0 1-.25 1z"/></svg>
            <span class="fc-label" th:text="#{floating.hotline}">Gọi Hotline</span>
        </a>
        <a class="fc-btn fc-zalo" href="https://zalo.me/0902842784" target="_blank" rel="noopener" th:title="#{floating.zalo}" title="Chat Zalo">
            <span class="fc-zalo-mark">Zalo</span>
            <span class="fc-label" th:text="#{floating.zalo}">Chat Zalo</span>
        </a>
        <a class="fc-btn fc-quote" href="/contact" th:title="#{floating.quote}" title="Yêu cầu báo giá">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M20 2H8a2 2 0 0 0-2 2v2H4a2 2 0 0 0-2 2v12l4-3h10a2 2 0 0 0 2-2v-2h2a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zM6 14H5.2L4 14.9V8h2zM20 12h-2V8a2 2 0 0 0-2-2H8V4h12z"/></svg>
            <span class="fc-label" th:text="#{floating.quote}">Yêu cầu báo giá</span>
        </a>
    </div>
</div>
</body>
</html>

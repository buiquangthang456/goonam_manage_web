    <style>
        .home-gm{
            position:relative;
            background:linear-gradient(135deg,#0f0f0f 0%,#1a1a1a 40%,#2a1a1a 70%,#1a1a1a 100%);
            color:#fff;
            padding:80px 5vw;
            /* phá khung container để chiếm full viewport width */
            margin-left:calc(50% - 50vw);
            margin-right:calc(50% - 50vw);
            width:100vw;
            max-width:100vw;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            overflow:hidden;
            border-radius:0;
        }
        /* Glow ambient nền */
        .home-gm::before{
            content:"";position:absolute;inset:0;pointer-events:none;
            background:
                radial-gradient(circle at 12% 18%, rgba(201,161,74,.18), transparent 45%),
                radial-gradient(circle at 88% 82%, rgba(211,47,47,.16), transparent 50%);
        }
        .home-gm > *{position:relative;z-index:1}
        .home-gm-inner{max-width:1280px;margin:0 auto;display:flex;gap:60px;align-items:center;flex-wrap:wrap;width:100%}
        .home-gm-text{flex:1 1 380px}
        .home-gm-label{display:inline-block;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#c9a14a;border:1px solid #c9a14a;padding:6px 14px;border-radius:20px;margin-bottom:18px}
        .home-gm-title{font-size:54px;font-weight:800;margin:6px 0;letter-spacing:1px;line-height:1.1}
        .home-gm-title .gm-g{color:#c9a14a}
        .home-gm-slogan{font-size:20px;color:#e0e0e0;margin-bottom:18px;font-style:italic}
        .home-gm-desc{font-size:16px;line-height:1.8;color:#cfcfcf;margin-bottom:28px;max-width:620px}
        .home-gm-actions{display:flex;gap:14px;flex-wrap:wrap}
        .home-gm-btn{display:inline-block;padding:14px 28px;border-radius:6px;font-weight:600;text-decoration:none;transition:.25s}
        .home-gm-btn-primary{background:#c9a14a;color:#1a1a1a;box-shadow:0 6px 18px rgba(201,161,74,.35)}
        .home-gm-btn-primary:hover{background:#e0b75c;transform:translateY(-2px);box-shadow:0 10px 26px rgba(201,161,74,.5)}
        .home-gm-btn-outline{border:1px solid #fff;color:#fff}
        .home-gm-btn-outline:hover{background:#fff;color:#1a1a1a}
        .home-gm-media{flex:1 1 380px;position:relative}
        .home-gm-media img{width:100%;height:auto;border-radius:10px;display:block;box-shadow:0 20px 50px rgba(0,0,0,.5)}
        .home-gm-cats-head{max-width:1280px;width:100%;margin:50px auto 0;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.12)}
        .home-gm-cats-title{font-size:24px;font-weight:800;color:#fff;margin:0;letter-spacing:.5px;position:relative;padding-left:16px}
        .home-gm-cats-title::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:5px;height:80%;background:#c9a14a;border-radius:3px}
        .home-gm-cats-all{color:#c9a14a;font-weight:600;font-size:14px;text-decoration:none;white-space:nowrap}
        .home-gm-cats-all:hover{text-decoration:underline}
        .home-gm-cats{max-width:1280px;width:100%;margin:22px auto 0;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:22px}
        .home-gm-cat{position:relative;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.18);text-decoration:none;color:#1a1a1a;display:flex;flex-direction:column;transition:transform .25s ease,box-shadow .25s ease}
        .home-gm-cat:hover{transform:translateY(-6px);box-shadow:0 12px 28px rgba(0,0,0,.32)}
        .home-gm-cat::after{content:"";position:absolute;left:0;bottom:0;width:100%;height:3px;background:#c9a14a;transform:scaleX(0);transform-origin:left;transition:transform .3s ease}
        .home-gm-cat:hover::after{transform:scaleX(1)}
        .home-gm-cat .img-wrap{display:block;height:170px;overflow:hidden}
        .home-gm-cat .img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
        .home-gm-cat:hover .img-wrap img{transform:scale(1.08)}
        .home-gm-cat .cat-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px}
        .home-gm-cat .cat-name{font-weight:700;font-size:15px;line-height:1.35;color:#1a1a1a;display:block}
        .home-gm-cat .cat-more{font-size:13px;font-weight:600;color:#b8862f;display:inline-flex;align-items:center;gap:5px}
        .home-gm-cat .cat-more::after{content:"\2192";transition:transform .25s ease}
        .home-gm-cat:hover .cat-more::after{transform:translateX(4px)}
        @media(max-width:900px){
            .home-gm{padding:60px 24px;min-height:auto}
            .home-gm-inner{gap:32px}
            .home-gm-title{font-size:38px}
            .home-gm-slogan{font-size:17px}
            .home-gm-desc{font-size:15px}
        }
        @media(max-width:600px){
            .home-gm{padding:48px 18px}
            .home-gm-title{font-size:30px}
            .home-gm-cats{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
            .home-gm-cat .img-wrap{height:130px}
            .home-gm-cats-head{margin-top:36px}
        }

</head>

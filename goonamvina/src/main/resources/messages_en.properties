welcome.title=WELCOME TO
company.name=GOONAM VINA
company.description.part1=From distant Korea, we came and have embraced Vietnam as our second home. The dragon-shaped curves on the map, the proud tradition of resisting foreign invasions, and even the history of a nation once divided between North and South — all reflect the unique bonds between our two peoples.
company.description.part2=Since 2003, with the aspiration to explore a new market, we have brought to Vietnam advanced technology, strict discipline, and a strong sense of responsibility — exemplified by the ppali-ppali (빨리 빨리 – “hurry, hurry”) culture of Korea — blended with the ingenuity, intelligence, and creativity of the Vietnamese people.
company.description.part3=For more than 20 years, we have taken pride in becoming an outstanding team, honored to contribute to landmark projects in collaboration with prestigious contractors and investors across Vietnam


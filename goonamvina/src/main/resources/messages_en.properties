#Googen Metal - homepage section
home.googenmetal.label=A brand of Goonam Vina
home.googenmetal.title=GOOGEN METAL
home.googenmetal.slogan=The art of metal - Korean engineering
home.googenmetal.description=Googen Metal is the premium decorative and architectural metalwork brand developed by Goonam Vina: railings, handrails, art staircases, metal cladding, PVD colored stainless steel, partitions and custom CNC-fabricated details. Built on over 20 years of Korean engineering experience and blended with the modern aesthetic of Vietnamese architecture, we deliver metal solutions that are sturdy and durable yet refined and elegant. Every product is meticulously crafted with high precision, fast installation and a long warranty - ready to elevate the value of homes, apartments, villas, hotels and factories.

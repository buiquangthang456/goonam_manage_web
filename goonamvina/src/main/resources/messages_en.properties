#colective
our_team.title=OUR TEAM
our_team.subtitle=We are a united collective, with each member embodying the Goonam Spirit – the 3T2K values, creating a unique identity and sustainable strength for Goonam Vina.
our_team.1.title=Speed (Quick Response)
our_team.1.description=Speed is Goonam Vina’s core strength. For more than 20 years, the spirit of “fast – precise – efficient” has become a hallmark of our culture, enabling us to seize opportunities and meet the strictest project requirements in a timely manner.
our_team.2.title=Responsibility
our_team.2.description=We uphold responsibility at the highest level – the spirit of “ownership.” Every member treats their work as if it were their own, bringing absolute confidence and peace of mind to our clients and partners.
our_team.3.title=Integrity & Kindness
our_team.3.description=Integrity is not just an attitude but a guiding principle. Carefulness, thoroughness, respect, and thoughtfulness in every detail help us build trust and long-lasting relationships with our clients.
our_team.4.title=Humility
our_team.4.description=Humility is a core value reflected in our willingness to listen, learn, and continuously improve. It is the foundation that enables the Goonam team to grow and develop sustainably.
our_team.5.title=Customer-Centric
our_team.5.description=Everything we do is for our customers. To us, the customer is at the center – the driving force that inspires us to consistently enhance quality, deliver outstanding service, and create the best possible value.

#role
team.title=Key Personnel
team.member1.name=Byun Hee Man 
team.member1.position=General Director
team.member1.description=With extensive industry experience and a background from a highly developed industrial nation, Mr. Byun Hee Man brings to Goonam Vina the values of discipline, precision, and advanced technical expertise. He has laid the foundation for a scientific working culture, consistently upholding quality and efficiency, and has been a steadfast leader guiding Goonam toward sustainable growth.
team.member2.name=Dao Minh Tuan
team.member2.position=Deputy General Director
team.member2.description=As a young leader, Mr. Đào Minh Tuấn is recognized for his creativity, adaptability, and strong cultural understanding. Fluent in Korean and deeply knowledgeable about both Korean and Vietnamese cultures, he serves as an essential bridge between international partners and the Goonam team. His insights enable tailored solutions, ensuring the highest product and service standards while strengthening Goonam Vina’s market position.

#colective
our_team.title=TẬP THỂ CHÚNG TÔI
our_team.subtitle=Là một tập thể gắn kết, mỗi thành viên đều mang trong mình tinh thần Goonam – Tinh thần 3T2K, tạo nên bản sắc riêng biệt và sức mạnh bền vững cho Goonam Vina.
our_team.1.title=Tốc độ (Đáp ứng nhanh)
our_team.1.description=Tốc độ là lợi thế cốt lõi của Goonam Vina. Trong suốt hơn 20 năm, tinh thần “nhanh – chính xác – hiệu quả” đã trở thành nét văn hóa đặc trưng, giúp chúng tôi luôn kịp thời nắm bắt cơ hội và đáp ứng yêu cầu khắt khe của từng dự án.
our_team.2.title=Trách nhiệm
our_team.2.description=Chúng tôi đề cao tinh thần trách nhiệm ở mức cao nhất – tinh thần “làm chủ”. Mỗi thành viên đều coi công việc như công việc của chính mình, từ đó mang lại sự an tâm tuyệt đối cho khách hàng và đối tác.
our_team.3.title=Tử tế
our_team.3.description=Tử tế không chỉ là thái độ, mà là nguyên tắc làm việc. Sự cẩn thận, kỹ lưỡng, tôn trọng và chu đáo trong từng chi tiết giúp chúng tôi xây dựng niềm tin và mối quan hệ bền vững với khách hàng.
our_team.4.title=Khiêm tốn
our_team.4.description=Khiêm tốn là giá trị cốt lõi, được thể hiện qua cách lắng nghe, tiếp thu, không ngừng học hỏi và cải tiến. Đây chính là nền tảng giúp tập thể Goonam ngày càng trưởng thành và phát triển.
our_team.5.title=Khách hàng
our_team.5.description=Mọi nỗ lực của Goonam Vina đều hướng đến khách hàng. Với chúng tôi, khách hàng là trung tâm – là động lực để không ngừng nâng cao chất lượng sản phẩm, dịch vụ và tạo ra những giá trị tốt đẹp nhất.

#role
team.title=BAN LÃNH ĐẠO
team.member1.name=Byun Hee Man
team.member1.position=Tổng Giám đốc
team.member1.description=Với bề dày kinh nghiệm trong ngành và xuất thân từ một đất nước công nghiệp phát triển, ông Byun Hee Man mang đến Goonam Vina tinh thần kỷ luật, chính xác cùng nền tảng kỹ thuật tiên tiến. Ông là người đặt nền móng cho phong cách làm việc khoa học, luôn kiên định trong mục tiêu chất lượng và hiệu quả, dẫn dắt tập thể Goonam vững bước trên con đường phát triển.
team.member2.name=Đào Minh Tuấn
team.member2.position=Phó giám đốc
team.member2.description=Là thế hệ lãnh đạo trẻ, ông Đào Minh Tuấn được biết đến với sự sáng tạo, linh hoạt và khả năng kết nối văn hóa. Thành thạo tiếng Hàn, am hiểu sâu sắc cả văn hóa Hàn Quốc và Việt Nam, ông Tuấn là cầu nối quan trọng giữa đối tác quốc tế và tập thể Goonam. Sự am hiểu này giúp ông đưa ra những giải pháp phù hợp, nâng cao chất lượng sản phẩm và dịch vụ, đồng thời củng cố vị thế Goonam Vina trên thị trường.

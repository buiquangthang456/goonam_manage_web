welcome.title=CHÀO MỪNG BẠN ĐẾN
company.name=GOONAM VINA
company.description.part1=Từ đất nước Hàn Quốc xa xôi, chúng tôi đã đến và gắn bó với Việt Nam như quê hương thứ hai của mình. Hình dáng cong cong như rồng trên bản đồ, truyền thống đấu tranh chống ngoại xâm và cả lịch sử chia cắt hai miền Nam – Bắc đã tạo nên những nét tương đồng đặc biệt giữa hai dân tộc.
company.description.part2=Bắt đầu từ năm 2003, với khát vọng chinh phục thị trường mới, chúng tôi mang đến Việt Nam kỹ thuật tiên tiến, tinh thần kỷ luật và trách nhiệm cao – tiêu biểu là văn hóa ppali-ppali (빨리 빨리 – nhanh nhanh) – hòa quyện cùng sự khéo léo, thông minh và sáng tạo của người Việt.
company.description.part3=Hơn 20 năm qua, chúng tôi tự hào trở thành một tập thể ưu tú, đồng hành cùng nhiều tổng thầu và chủ đầu tư uy tín, góp mặt trong những công trình trọng điểm của Việt Nam. 


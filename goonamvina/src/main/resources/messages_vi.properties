#Googen Metal - "Why choose" section
gm.why.title.lead=Tại sao chọn
gm.why.subtitle=Hơn cả một thương hiệu — là cam kết về chất lượng và thẩm mỹ
gm.why.1.title=Công nghệ Hàn Quốc
gm.why.1.desc=Máy CNC, cắt laser, gia công kim loại theo tiêu chuẩn công nghiệp Hàn Quốc với độ chính xác cao.
gm.why.2.title=Thiết kế tuỳ chỉnh
gm.why.2.desc=Thiết kế theo yêu cầu của kiến trúc sư và chủ đầu tư — từ phối màu tới kích thước và hình dạng.
gm.why.3.title=Đội ngũ kinh nghiệm
gm.why.3.desc=Hơn 20 năm trong nghề với đội ngũ kỹ thuật đã thực hiện hàng trăm công trình lớn.
gm.why.4.title=Tiến độ nhanh
gm.why.4.desc=Tinh thần "ppali-ppali" của Hàn Quốc — cam kết tiến độ, không trễ hẹn với khách hàng.
gm.why.5.title=Bảo hành dài hạn
gm.why.5.desc=Cam kết bảo hành sản phẩm và hỗ trợ kỹ thuật sau lắp đặt, đồng hành dài lâu cùng công trình.
gm.why.6.title=Chất lượng quốc tế
gm.why.6.desc=Vật liệu nhập khẩu cao cấp, sơn tĩnh điện, inox mạ PVD đạt chuẩn xuất khẩu.


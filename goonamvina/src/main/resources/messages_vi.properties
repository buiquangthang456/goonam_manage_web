#Googen Metal - homepage section
home.googenmetal.label=Thương hiệu của Goonam Vina
home.googenmetal.title=GOOGEN METAL
home.googenmetal.slogan=Nghệ thuật từ kim loại - Kỹ thuật Hàn Quốc
home.googenmetal.description=Googen Metal là thương hiệu chuyên gia công và thi công các sản phẩm kim loại trang trí - kiến trúc cao cấp được Goonam Vina phát triển: lan can, tay vịn, cầu thang nghệ thuật, mặt dựng kim loại, inox mạ màu PVD, vách ngăn và các chi tiết gia công CNC theo yêu cầu. Kế thừa hơn 20 năm kinh nghiệm cùng công nghệ từ Hàn Quốc, kết hợp với gu thẩm mỹ hiện đại của kiến trúc Việt Nam, chúng tôi mang đến giải pháp kim loại vừa chắc chắn, bền bỉ, vừa tinh tế và sang trọng. Mỗi sản phẩm đều được chế tác tỉ mỉ, đảm bảo độ chính xác cao, thi công nhanh và bảo hành dài hạn - sẵn sàng đồng hành cùng nhà ở, chung cư, biệt thự, khách sạn và nhà xưởng để nâng tầm giá trị cho mọi công trình của bạn.
